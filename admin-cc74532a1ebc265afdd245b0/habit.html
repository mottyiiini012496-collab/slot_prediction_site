const WK = ["月","火","水","木","金","土","日"];
const m = VIEW.meta;
document.getElementById("meta").innerHTML =
  "生成: "+m.generated_at+" ／ データ: "+m.data_min+"〜"+m.data_max+
  " ／ 検定 "+m.n_tested+"島 ／ <b>癖あり: "+m.n_sig+"島</b>";

// 主因を人間向けの言葉に
const DRIVER_JP = {
  "いつ(曜日/日)":"曜日・日付", "どの台/位置":"座る台・位置",
  "直近の勢い":"直近の連続した好調（設定続行）", "島の勢い":"シマ全体の勢い",
  "店の資金/月":"店の月ペース・曜日/日付のクセ", "台の月内累積":"その台の今月の出方（回収/放出）"};

// AUCを『効き』の言葉に
function kikiWord(auc){
  if(auc>=0.60) return ["強い",3];
  if(auc>=0.56) return ["中くらい",2];
  if(auc>=0.53) return ["弱い",1];
  return ["ごく弱い",0];
}
function pct(v){ return v==null?"-":Math.round(v*100)+"%"; }

function autoSummary(is){
  const base = is.base_plus;
  const wk = is.weekday_plusrate||{};
  let strong=[], weak=[];
  WK.forEach(d=>{ let v=wk[d]; if(v==null||base==null) return;
    if(v-base>=0.06) strong.push(d); if(v-base<=-0.06) weak.push(d); });
  let parts=[];
  parts.push("主に【"+(DRIVER_JP[is.main_driver]||is.main_driver)+"】で差が出る島。");
  if(strong.length) parts.push("<b class='pos'>"+strong.join("・")+"曜</b>が強め");
  if(weak.length) parts.push("<b class='neg'>"+weak.join("・")+"曜</b>は弱め");
  // 席の差
  const seatAuc = (is.drivers||{})["どの台/位置"];
  if(seatAuc!=null && seatAuc>=0.53) parts.push("特定の台に差あり（下記）");
  else parts.push("席による差は小さい");
  return parts.join("／ ");
}

function wkChart(wk, base){
  let cells = WK.map(d=>{
    let v = wk[d]==null?0:wk[d];
    let h = Math.round(v*100);                 // 0-100%をそのまま高さに
    let col = (base!=null && v-base>=0.06) ? "#34d399" : (base!=null && v-base<=-0.06 ? "#f87171" : "#93c5fd");
    let baseLine = base!=null ? '<span class="wkbase" style="bottom:'+Math.round(base*100)+'%"></span>' : '';
    return '<div class="wkcell"><div class="wkbar">'+baseLine+'<i style="height:'+h+'%;background:'+col+'"></i></div>'+
           d+'<br><span class="wkpct">'+Math.round(v*100)+'%</span></div>';
  }).join("");
  return '<div class="wk">'+cells+'</div>';
}
function domChart(dom, base){
  let days = Object.keys(dom).map(Number).sort((a,b)=>a-b);
  let cells = days.map(d=>{
    let v = dom[d]==null?0:dom[d];
    let h = Math.round(v*100);
    let col = (base!=null && v-base>=0.06) ? "#34d399" : (base!=null && v-base<=-0.06 ? "#f87171" : "#93c5fd");
    let baseLine = base!=null ? '<span class="dombase" style="bottom:'+Math.round(base*100)+'%"></span>' : '';
    return '<div class="domcell"><div class="dombar" title="'+d+'日: '+Math.round(v*100)+'%">'+baseLine+
           '<i style="height:'+h+'%;background:'+col+'"></i></div>'+d+'</div>';
  }).join("");
  return '<div class="dom">'+cells+'</div>';
}
function driverRows(drivers){
  return Object.entries(drivers||{}).filter(([k,v])=>v!=null).sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>{
      let [w,lvl]=kikiWord(v);
      let fillpct=Math.min(100,Math.round(Math.max(0,(v-0.5))*2*100));
      let col=lvl>=3?"#4f46e5":lvl>=2?"#818cf8":lvl>=1?"#c7d2fe":"#e2e8f0";
      return '<div class="drow"><span class="dlabel">'+(DRIVER_JP[k]||k)+'</span>'+
        '<span class="dkiki k'+lvl+'">'+w+'</span>'+
        '<span class="dtrack"><span class="dfill" style="width:'+fillpct+'%;background:'+col+'"></span></span></div>';
    }).join("");
}
function machines(mp, base){
  let ent = Object.entries(mp);   // 既にPython側でプラス率の降順にソート済み
  if(!ent.length) return "";
  let head = '<div class="sec">台番号ごとのプラス率（この島平均 '+pct(base)+'）</div>';
  // 台数が少ないと「上位」と「下位」が同じ台を重複表示してしまうため、
  // その場合は上下に分けず1本のリストにする。
  if(ent.length <= 8){
    let all = ent.map(([k,v])=>k+"番("+Math.round(v*100)+"%)").join("　");
    return head + '<div class="mlist">'+all+'</div>';
  }
  let top = ent.slice(0,5).map(([k,v])=>k+"番("+Math.round(v*100)+"%)").join("　");
  let bot = ent.slice(-3).map(([k,v])=>k+"番("+Math.round(v*100)+"%)").join("　");
  return head +
    '<div class="mlist"><span class="pos">▲強い</span> '+top+'<br><span class="neg">▼弱い</span> '+bot+'</div>';
}
function card(is){
  let [w,lvl]=kikiWord(is.auc);
  let dom = is.dayofmonth_plusrate||{};
  let domTop = Object.entries(dom).sort((a,b)=>b[1]-a[1]).slice(0,5)
        .map(([k,v])=>k+"日("+Math.round(v*100)+"%)").join("　");
  let domBot = Object.entries(dom).sort((a,b)=>a[1]-b[1]).slice(0,5)
        .map(([k,v])=>k+"日("+Math.round(v*100)+"%)").join("　");
  const gapCls = (is.diff_top-is.diff_bottom)>=0?"pos":"neg";
  return '<div class="card">'+
    '<h3>'+is.store+' × '+is.model+'</h3>'+
    '<div class="sub">検証期間 '+is.n_test+'台日 ／ '+is.n_days+'日 ／ '+is.n_machines+'台</div>'+
    '<div class="summary">📌 '+autoSummary(is)+'</div>'+
    '<div class="badges">'+
      '<span class="badge kiki-'+(lvl>=3?'strong':lvl>=2?'mid':'weak')+'">予測の効き: '+w+'</span>'+
      '<span class="badge">この島の平均プラス率 '+pct(is.base_plus)+'</span>'+
    '</div>'+
    '<div class="eff">AIが「来る」と選んだ台は <b class="pos">'+Math.round(is.plus_top*100)+'%</b> がプラス'+
      '（外した台は <b class="neg">'+Math.round(is.plus_bottom*100)+'%</b>／島平均 '+pct(is.base_plus)+'）。<br>'+
      '平均差枚は 選んだ側 <b class="'+gapCls+'">'+(is.diff_top>=0?'+':'')+Math.round(is.diff_top)+'枚</b>、'+
      '外した側 <b>'+(is.diff_bottom>=0?'+':'')+Math.round(is.diff_bottom)+'枚</b>。</div>'+
    '<details><summary>詳しく見る（曜日・日・台番号・要因）</summary>'+
      '<div class="sec">曜日ごとのプラス率</div>'+
      '<div class="cap">棒の高さ＝その曜日にプラスで終えた割合。点線＝この島の平均（'+pct(is.base_plus)+'）。緑=平均超え／赤=平均割れ。</div>'+
      wkChart(is.weekday_plusrate||{}, is.base_plus)+
      '<div class="sec">日付ごとのプラス率</div>'+
      '<div class="cap">棒の高さ＝その日にプラスで終えた割合。点線＝この島の平均（'+pct(is.base_plus)+'）。緑=平均超え／赤=平均割れ。</div>'+
      domChart(is.dayofmonth_plusrate||{}, is.base_plus)+
      '<div class="mlist"><span class="pos">▲強い日</span> '+domTop+'<br><span class="neg">▼弱い日</span> '+domBot+'</div>'+
      machines(is.machine_plusrate||{}, is.base_plus)+
      '<div class="sec">要因ごとの効き（どの切り口で差が出ているか）</div>'+
      '<div class="cap">「効き」が強い切り口ほど、その島の癖の正体。ほぼ無＝その切り口では差なし。</div>'+
      driverRows(is.drivers)+
    '</details></div>';
}
function render(filter){
  let list = VIEW.islands||[];
  if(filter){ let f=filter.toLowerCase();
    list = list.filter(is=>(is.store+" "+is.model).toLowerCase().indexOf(f)!==-1); }
  const el = document.getElementById("list");
  el.innerHTML = list.length ? list.map(card).join("") : '<div class="empty">該当なし。</div>';
}
document.getElementById("q").addEventListener("input", e=>render(e.target.value.trim()));
render("");
</script>
