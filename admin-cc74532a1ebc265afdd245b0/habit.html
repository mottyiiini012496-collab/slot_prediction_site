 効果は「予測上位1/3 vs 下位1/3」の実際のプラス率・平均差枚。台単体の的中を保証するものではありません。
</div>

  " ／ 検定 "+m.n_tested+"島 ／ <b>癖あり(FDR"+Math.round(m.fdr*100)+"%): "+m.n_sig+"島</b>";

function bar(label, auc){
  const v = Math.max(0, (auc-0.5))*2;          // 0.5=0, 1.0=1
  const pct = Math.min(100, Math.round(v*100));
  const col = auc>=0.55 ? "#4f46e5" : (auc>=0.52 ? "#818cf8" : "#cbd5e1");
  return '<div class="barrow"><span class="barlabel">'+label+'</span>'+
    '<span class="bartrack"><span class="barfill" style="width:'+pct+'%;background:'+col+'"></span></span>'+
    '<span class="barval">'+auc.toFixed(3)+'</span></div>';
}
function wkChart(wk){
  let vals = WK.map(d => wk[d]==null?0:wk[d]);
  let mx = Math.max(...vals, 0.01);
  let cells = WK.map(d=>{
    let v = wk[d]==null?0:wk[d];
    let h = Math.round(v/mx*100);
    return '<div class="wkcell"><div class="wkbar"><i style="height:'+h+'%"></i></div>'+d+'<br>'+Math.round(v*100)+'%</div>';
  }).join("");
  return '<div class="wk">'+cells+'</div>';
}
function machines(mp){
  let ent = Object.entries(mp);
  if(!ent.length) return "";
  let top = ent.slice(0,5).map(([k,v])=>k+"("+Math.round(v*100)+"%)").join("  ");
  let bot = ent.slice(-3).map(([k,v])=>k+"("+Math.round(v*100)+"%)").join("  ");
  return '<div class="sec">台番号（プラス率・上位/下位）</div><div class="mlist">▲ '+top+'<br>▼ '+bot+'</div>';
}
function card(is){
  const gap = is.diff_top - is.diff_bottom;
  const cls = gap>0 ? "pos" : "neg";
  let drivers = Object.entries(is.drivers||{}).filter(([k,v])=>v!=null)
        .sort((a,b)=>b[1]-a[1]).map(([k,v])=>bar(k,v)).join("");
  let dom = is.dayofmonth_plusrate||{};
  let domTop = Object.entries(dom).sort((a,b)=>b[1]-a[1]).slice(0,5)
        .map(([k,v])=>k+"日("+Math.round(v*100)+"%)").join("  ");
  return '<div class="card" data-key="'+(is.store+" "+is.model).toLowerCase()+'">'+
    '<h3>'+is.store+' × '+is.model+'</h3>'+
    '<div class="sub">'+is.n_days+'日 / '+is.n_machines+'台 / 検証'+is.n_test+'件</div>'+
    '<div class="badges">'+
      '<span class="badge main">主因: '+is.main_driver+'</span>'+
      '<span class="badge">AUC '+is.auc.toFixed(3)+'</span>'+
      '<span class="badge">q '+is.q.toFixed(3)+'</span>'+
      '<span class="badge '+cls+'">差枚 '+Math.round(is.diff_top)+' / '+Math.round(is.diff_bottom)+'</span>'+
    '</div>'+
    '<div class="eff">予測上位1/3は <b>'+Math.round(is.plus_top*100)+'%</b> がプラス（平均<b>'+Math.round(is.diff_top)+'枚</b>）、'+
      '下位1/3は <b>'+Math.round(is.plus_bottom*100)+'%</b>（平均<b>'+Math.round(is.diff_bottom)+'枚</b>）</div>'+
    '<details><summary>詳しく（要因の内訳・曜日・台番号）</summary>'+
      '<div class="sec">要因ごとの効き（AUC・0.5=無)</div>'+drivers+
      '<div class="sec">曜日ごとのプラス率</div>'+wkChart(is.weekday_plusrate||{})+
      '<div class="sec">強い日（プラス率上位）</div><div class="mlist">'+domTop+'</div>'+
      machines(is.machine_plusrate||{})+
    '</details></div>';
}
function render(filter){
  let list = VIEW.islands||[];
  if(filter){ let f=filter.toLowerCase();
    list = list.filter(is=>(is.store+" "+is.model).toLowerCase().indexOf(f)!==-1); }
  const el = document.getElementById("list");
  el.innerHTML = list.length ? list.map(card).join("") :
    '<div class="empty">該当なし。</div>';
}
document.getElementById("q").addEventListener("input", e=>render(e.target.value.trim()));
render("");
